## ZSH
ZDOTDIR="${XDG_CONFIG_HOME:-$HOME/.config}/zsh"

## Winit
#WINIT_UNIX_BACKEND=x11

## GDK (GTK)
#GDK_BACKEND=x11
#GDK_BACKEND=wayland

## QT
#QT_QPA_PLATFORM=wayland
#QT_WAYLAND_DISABLE_WINDOWDECORATION="1"
#QT_AUTO_SCREEN_SCALE_FACTOR=0
